[build]
  command = "pnpm build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["@resvg/resvg-js"]
  included_files = ["dist/client/**/*"]

[dev]
  framework = "#custom"
  command = "pnpm astro dev"
  targetPort = 4321
  port = 8888
  publish = "dist"
  autoLaunch = false
  host = "0.0.0.0"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[build.environment]
  NODE_VERSION = "20.11.1"
  NPM_FLAGS = "--version"
  NETLIFY = "true"
  SHARP_IGNORE_GLOBAL = "true"

[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true

 